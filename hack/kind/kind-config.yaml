kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: verdict2
nodes:
  - role: control-plane
    # GitLab web/registry exposed on localhost for e2e clients and seeding scripts.
    extraPortMappings:
      - containerPort: 30080 # gitlab http (NodePort)
        hostPort: 8929
      - containerPort: 30022 # gitlab ssh (NodePort)
        hostPort: 2224
