# DRAFT — archetype "ownership" as ONE rule with onFail (ADR-0007 amendment 2).
# Membership arrives as a fact from a permission provider (ADR-0004): Keycloak, LDAP,
# GitLab/GitHub groups, or an ownership file — the rule doesn't care.
apiVersion: assent.dev/v1alpha1
kind: MergePolicy
metadata:
  name: ownership
spec:
  rules:
    - name: author-owns-entry
      match:
        classes: [kafka-topic]
      assert: "entry.owner in facts.author.groups"
      effect: vouch
      onFail:
        effect: challenge
        message: "You are not in the owning group `{{ entry.owner }}` — owner must resolve this thread."
      docs:
        url: https://example.com/policies/ownership
