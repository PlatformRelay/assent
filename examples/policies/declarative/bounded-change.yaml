# DRAFT — illustrative rule in the YAML envelope (ADR-0002 v2 / ADR-0010); same archetype
# as ../rego/bounded_change.rego. `assert` syntax is decided by Spike A (OQ-12).
apiVersion: assent.dev/v1alpha1
kind: MergePolicy
metadata:
  name: bounded-change-partitions
spec:
  rules:
    - name: partition-increase-within-quota
      match:
        changes:
          - path: "**/partitions"
            kind: modify
      assert: "new >= old && new <= facts.quota.max_partitions"
      effect: vouch          # predicate holds -> change is automerge-eligible (ADR-0007)
      points: 1
      docs:
        url: https://example.com/policies/partitions
        summary: "Partition increases within quota are safe; decreases are not possible in Kafka."
    - name: partition-decrease
      match:
        changes:
          - path: "**/partitions"
            kind: modify
      assert: "new < old"    # predicate true -> effect applies
      effect: block
      message: "partitions may not decrease ({{ old }} -> {{ new }})"
