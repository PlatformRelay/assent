# DRAFT — envelope rule (ADR-0010/0013): one predicate, both outcomes via onFail
# (ADR-0007 amendment 2) — no negation-pair twin rules, and the quota-exceeded case
# gets an explanation instead of a silent "uncovered change".
apiVersion: assent.dev/v1alpha1
kind: MergePolicy
metadata:
  name: bounded-change-partitions
spec:
  rules:
    - name: partition-change-bounds
      match:
        changes:
          - path: "**/partitions"
            kind: modify
      assert:
        all:
          - cel: new >= old
            message: "partitions may not decrease ({{ old }} -> {{ new }})"
          - cel: new <= facts.quota.max_partitions
            message: "partitions {{ new }} exceeds quota {{ facts.quota.max_partitions }}"
      effect: vouch          # predicate true -> automerge-eligible
      points: 1              # accrues PER FIRING: many bumps in one MR add up (bulk guard)
      onFail:
        effect: challenge    # predicate false -> the failing leaf's message explains why
      docs:
        url: https://example.com/policies/partitions
        summary: "Partition increases within quota are safe; decreases are not possible in Kafka."
