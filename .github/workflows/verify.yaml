# CI gate set (security review A-10): lint incl. gosec, secrets, vulns, tests+coverage.
name: verify
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # gitleaks scans history
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable # go.mod stays the minimum; CI runs latest stable (govulncheck needs it)
      - run: go vet ./...
      - name: golangci-lint (incl. gosec)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2 # matches the v2 config schema in .golangci.yml
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      # Scope to HEAD history only — fetch-depth:0 still downloads sibling lane refs;
      # default gitleaks walks them and lane canaries must not red main CI.
      - name: gitleaks # CLI directly — gitleaks-action requires a paid license for org repos
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect --source . --no-banner --redact --log-opts="HEAD"
      - run: go test -race ./...
      - name: coverage gate (>=90% on internal/, D-010)
        run: |
          if ls internal/*/*.go >/dev/null 2>&1; then
            go test -coverprofile=cov.out ./internal/...
            pct=$(go tool cover -func=cov.out | awk '/^total:/ {gsub("%","",$3); print $3}')
            echo "coverage: ${pct}% (required: 90%)"
            awk -v p="$pct" 'BEGIN { exit (p+0 >= 90 ? 0 : 1) }'
          else
            echo "no internal packages yet — gate armed, not applicable"
          fi
      - run: CGO_ENABLED=0 go build ./...
