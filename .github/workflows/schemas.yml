# P3-E1-S06 — schema-validation CI job (ADR-0017 §7: schemas are the public
# API). Runs on every PR: compiles every schemas/**/*.schema.json as valid
# JSON Schema draft 2020-12, and validates every apiVersion/kind-bearing
# fixture under examples/contracts/** (this epic's own strict-fixture and
# named-consumer-compat directories, P3-E1-S07) against its matching schema —
# failing the PR, not merely warning, on any drift.
name: schemas
on:
  pull_request:
    paths:
      - "schemas/**"
      - "examples/contracts/**"
      - ".github/workflows/schemas.yml"
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "examples/contracts/**"
      - ".github/workflows/schemas.yml"
permissions:
  contents: read
jobs:
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - name: compile schemas + validate examples/contracts fixtures
        run: go test -race ./schemas/...
